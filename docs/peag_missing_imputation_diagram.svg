<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 230" width="860" height="230">
  <defs>
    <style>
      .fg { fill: #1a1a1a; }
      .label { font: 600 12px system-ui, sans-serif; }
      .cell { font: 14px system-ui, sans-serif; fill: #fff; }
      .cell-available { fill: #2d7d46; stroke: #2d7d46; }
      .cell-missing { fill: none; stroke: #868e96; stroke-dasharray: 4 2; }
      .cell-missing-char { fill: #868e96; font: 14px system-ui, sans-serif; }
      .peag-box { fill: #0d6efd; }
      .peag-text { fill: #fff; font: 700 18px system-ui, sans-serif; letter-spacing: 0.1em; }
      .arrow { fill: #495057; font-size: 24px; }
      .output-grid { opacity: 0; transform-origin: 590px 70px; animation: outputAppear 4s ease-in-out infinite; }
      .imputed-cell { animation: imputedPulse 4s ease-in-out infinite; }
      @keyframes outputAppear {
        0%, 35% { opacity: 0; transform: scale(0.95); }
        45%, 100% { opacity: 1; transform: scale(1); }
      }
      @keyframes imputedPulse {
        0%, 45%, 100% { opacity: 1; }
        50%, 55% { opacity: 0.7; }
        60% { opacity: 1; }
      }
    </style>
  </defs>

  <!-- Input panel -->
  <g transform="translate(0, 0)">
    <text x="70" y="20" class="label fg">Input</text>
    <text x="100" y="48" class="label fg">Modality A</text>
    <text x="220" y="48" class="label fg">Modality B</text>

    <text x="8" y="78" class="label fg">Visit 1</text>
    <rect x="100" y="62" width="98" height="30" rx="4" class="cell-available"/>
    <text x="149" y="82" class="cell">&#x2713;</text>
    <rect x="220" y="62" width="98" height="30" rx="4" class="cell-available"/>
    <text x="269" y="82" class="cell">&#x2713;</text>

    <text x="8" y="114" class="label fg">Visit 2</text>
    <rect x="100" y="98" width="98" height="30" rx="4" class="cell-missing"/>
    <text x="149" y="118" class="cell-missing-char">?</text>
    <rect x="220" y="98" width="98" height="30" rx="4" class="cell-available"/>
    <text x="269" y="118" class="cell">&#x2713;</text>

    <text x="8" y="150" class="label fg">Visit 3</text>
    <rect x="100" y="134" width="98" height="30" rx="4" class="cell-available"/>
    <text x="149" y="154" class="cell">&#x2713;</text>
    <rect x="220" y="134" width="98" height="30" rx="4" class="cell-missing"/>
    <text x="269" y="154" class="cell-missing-char">?</text>
  </g>

  <!-- Arrow 1 -->
  <text x="360" y="114" class="arrow">&#x2192;</text>

  <!-- PEAG box -->
  <g transform="translate(390, 80)">
    <rect x="0" y="0" width="100" height="56" rx="8" class="peag-box"/>
    <text x="50" y="36" class="peag-text" text-anchor="middle">PEAG</text>
  </g>

  <!-- Arrow 2 -->
  <text x="500" y="114" class="arrow">&#x2192;</text>

  <!-- Output panel -->
  <g class="output-grid" transform="translate(0, 0)">
    <text x="590" y="20" class="label fg">Output</text>
    <text x="620" y="48" class="label fg">Modality A</text>
    <text x="740" y="48" class="label fg">Modality B</text>

    <text x="528" y="78" class="label fg">Visit 1</text>
    <rect x="620" y="62" width="98" height="30" rx="4" class="cell-available"/>
    <text x="669" y="82" class="cell">&#x2713;</text>
    <rect x="740" y="62" width="98" height="30" rx="4" class="cell-available"/>
    <text x="789" y="82" class="cell">&#x2713;</text>

    <text x="528" y="114" class="label fg">Visit 2</text>
    <rect x="620" y="98" width="98" height="30" rx="4" class="cell-available imputed-cell"/>
    <text x="669" y="118" class="cell">&#x2713;</text>
    <rect x="740" y="98" width="98" height="30" rx="4" class="cell-available"/>
    <text x="789" y="118" class="cell">&#x2713;</text>

    <text x="528" y="150" class="label fg">Visit 3</text>
    <rect x="620" y="134" width="98" height="30" rx="4" class="cell-available"/>
    <text x="669" y="154" class="cell">&#x2713;</text>
    <rect x="740" y="134" width="98" height="30" rx="4" class="cell-available imputed-cell"/>
    <text x="789" y="154" class="cell">&#x2713;</text>
  </g>
</svg>
